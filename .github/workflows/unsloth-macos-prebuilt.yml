# Build and publish Unsloth Studio's own macOS llama.cpp prebuilts once per day.
# Source is ggml-org/llama.cpp at the newest release that has been public for at
# least UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS (supply-chain delay); the only change
# over their macos-cpu build is an explicit -DCMAKE_OSX_DEPLOYMENT_TARGET per
# slice, so the binaries declare their load floor instead of inheriting the
# runner OS: arm64 pins 14.0 (the floor of upstream's pre-macos-26 arm64
# release), x64 pins 13.3 (matching upstream's own Intel leg, which still
# covers 2017 Intel Macs capped at Ventura). Publishes a macOS-only release on
# this fork that Studio installs from.

name: Unsloth macOS llama.cpp prebuilt

on:
  schedule:
    - cron: "13 22 * * *"   # ~3PM San Francisco (UTC; not DST adjusted)
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "ggml-org/llama.cpp release tag to build (blank = newest aged release)"
        required: false
        default: ""
      min_age_hours:
        description: "Only build a release public for at least this many hours (blank = default)"
        required: false
        default: ""

concurrency:
  group: unsloth-macos-prebuilt
  cancel-in-progress: false

permissions:
  contents: write

env:
  # Supply-chain aging: build only upstream releases that have been public for
  # at least this many hours, so a malicious or broken release has time to be
  # caught and yanked before we compile and ship it. Per-run override above.
  UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS: "6"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.r.outputs.upstream_tag }}
      source_commit: ${{ steps.r.outputs.source_commit }}
      release_tag: ${{ steps.r.outputs.release_tag }}
      skip: ${{ steps.r.outputs.skip }}
    steps:
      - name: Resolve upstream tag and check idempotency
        id: r
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REQ="${{ github.event.inputs.upstream_tag }}"
          AGE_H="${{ github.event.inputs.min_age_hours }}"
          [ -n "$AGE_H" ] || AGE_H="${UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS:-6}"
          if [ -n "$REQ" ]; then
            TAG="$REQ"   # explicit override skips the aging filter
          else
            # Newest published release that has been public for >= AGE_H hours.
            CUTOFF="$(date -u -d "-${AGE_H} hours" +%s)"
            TAG="$(gh api 'repos/ggml-org/llama.cpp/releases?per_page=100' \
              --jq "[.[] | select(.draft==false and .prerelease==false) | select((.published_at|fromdateiso8601) <= ${CUTOFF})] | first | .tag_name")"
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::no ggml-org release older than ${AGE_H}h found in the last 100 releases"
              exit 1
            fi
            echo "selected $TAG (aged >= ${AGE_H}h)"
          fi
          SHA="$(gh api "repos/ggml-org/llama.cpp/commits/$TAG" --jq .sha)"
          RTAG="llama-prebuilt-macos-$TAG"
          SKIP=false
          if gh release view "$RTAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            SKIP=true
          fi
          {
            echo "upstream_tag=$TAG"
            echo "source_commit=$SHA"
            echo "release_tag=$RTAG"
            echo "skip=$SKIP"
          } >> "$GITHUB_OUTPUT"
          echo "upstream=$TAG commit=$SHA release=$RTAG skip=$SKIP"

  build:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: arm64
            runner: macos-14
            defines: "-DGGML_METAL_USE_BF16=ON -DGGML_METAL_EMBED_LIBRARY=ON"
            expect_arch: arm64
            deploy_target: "14.0"   # no Apple Silicon Mac is capped below 14
          - build: x64
            runner: macos-15-intel
            defines: "-DGGML_METAL=OFF"
            expect_arch: x86_64
            deploy_target: "13.3"   # matches upstream; covers 2017 Intel (Ventura)
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Clone ggml-org source at ${{ needs.resolve.outputs.upstream_tag }}
        run: |
          git clone --depth 1 --branch "${{ needs.resolve.outputs.upstream_tag }}" \
            https://github.com/ggml-org/llama.cpp src

      - name: Build (deployment target ${{ matrix.deploy_target }})
        working-directory: src
        run: |
          set -euo pipefail
          cmake -B build \
            ${{ matrix.defines }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }} \
            -DCMAKE_INSTALL_RPATH='@loader_path' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON
          cmake --build build --config Release -j "$(sysctl -n hw.logicalcpu)"

      - name: Load gate (minos <= ${{ matrix.deploy_target }}, arch, launch)
        run: bash scripts/unsloth/assert_macho_minos.sh src/build/bin "${{ matrix.expect_arch }}" "${{ matrix.deploy_target }}"

      - name: Package
        working-directory: src
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.upstream_tag }}"
          cp LICENSE build/bin/
          tar -czf "../llama-${TAG}-bin-macos-${{ matrix.build }}.tar.gz" \
            -s ",^\.,llama-${TAG}," -C build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.build }}
          path: llama-*-bin-macos-${{ matrix.build }}.tar.gz
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Stage slice tarballs and source archives
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.upstream_tag }}"
          SHA="${{ needs.resolve.outputs.source_commit }}"
          mkdir -p assets
          cp dist/macos-arm64/llama-*-bin-macos-arm64.tar.gz assets/
          cp dist/macos-x64/llama-*-bin-macos-x64.tar.gz assets/
          git clone --depth 1 --branch "$TAG" https://github.com/ggml-org/llama.cpp src
          tar --exclude=.git -czf "assets/llama.cpp-source-${TAG}.tar.gz" -C src .
          cp "assets/llama.cpp-source-${TAG}.tar.gz" "assets/llama.cpp-source-commit-${SHA}.tar.gz"

      - name: Generate manifest and checksums
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.upstream_tag }}"
          SHA="${{ needs.resolve.outputs.source_commit }}"
          python3 scripts/unsloth/gen_manifest.py \
            --upstream-tag "$TAG" \
            --source-commit "$SHA" \
            --release-tag "${{ needs.resolve.outputs.release_tag }}" \
            --out-dir assets \
            --artifact "macos-arm64:assets/llama-${TAG}-bin-macos-arm64.tar.gz" \
            --artifact "macos-x64:assets/llama-${TAG}-bin-macos-x64.tar.gz" \
            --source-archive "assets/llama.cpp-source-${TAG}.tar.gz" \
            --exact-source-archive "assets/llama.cpp-source-commit-${SHA}.tar.gz"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.upstream_tag }}"
          RTAG="${{ needs.resolve.outputs.release_tag }}"
          gh release create "$RTAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target master \
            --title "llama.cpp prebuilt macos $TAG" \
            --notes "Install-ready Unsloth Studio llama.cpp macOS bundles for $TAG." \
            assets/*
