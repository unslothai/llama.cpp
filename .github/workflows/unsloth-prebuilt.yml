name: Unsloth prebuilt (full release)

# Atomic daily build for unslothai/llama.cpp. One cron, one workflow run, one
# release per upstream b#### tag. Splits the heavy build work into four reusable
# children:
#   unsloth-prebuilt-cuda.yml          -- Linux CUDA bundles (x64 + arm64, matrix profiles)
#   unsloth-prebuilt-windows-cuda.yml  -- Windows CUDA bundles (x64, matrix profiles)
#   unsloth-prebuilt-rocm.yml          -- ROCm bundles (Windows + Ubuntu, per gfx target)
#   unsloth-prebuilt-macos.yml         -- macOS bundles (arm64 Metal + x64 CPU)
#
# Atomicity: the `assemble` job depends on all children. GitHub's default
# `needs` semantics require all needs to succeed -- if any matrix entry in
# any child fails, `assemble` skips and no release is published. The
# installer needs the full bundle set at the same tag or it'll dispatch to
# something that isn't there.

on:
  schedule:
    - cron: '30 2 * * *'       # 02:30 UTC: ggml-org's daily low-activity valley (~27 commits/h vs ~120 midday); off-the-hour also avoids GitHub's :00 cron backlog
  workflow_dispatch:
    inputs:
      tag:
        description: 'ggml-org tag (b#### or "latest")'
        default: 'latest'
        required: true
        type: string
      only_profile:
        description: 'CUDA profile to build'
        default: 'all'
        required: false
        type: choice
        options: [all, cuda12-older, cuda12-newer, cuda12-portable, cuda13-older, cuda13-newer, cuda13-portable]
      operating_systems:
        description: 'OSes for ROCm builds'
        default: 'windows,ubuntu'
        required: false
        type: string
      gfx_target:
        description: 'GPU targets for ROCm builds'
        default: 'gfx1151,gfx1150,gfx120X,gfx110X,gfx103X'
        required: false
        type: string
      rocm_version:
        description: 'ROCm version (or "latest")'
        default: 'latest'
        required: false
        type: string
      publish:
        description: 'Publish to GitHub Releases'
        default: false
        required: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || 'scheduled' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      commit: ${{ steps.r.outputs.commit }}
      exists: ${{ steps.r.outputs.exists }}
      cuda_matrix: ${{ steps.r.outputs.cuda_matrix }}
      win_cuda_matrix: ${{ steps.r.outputs.win_cuda_matrix }}
      rocm_matrix: ${{ steps.r.outputs.rocm_matrix }}
      macos_matrix: ${{ steps.r.outputs.macos_matrix }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          REQ='${{ github.event.inputs.tag || 'latest' }}'
          ONLY='${{ github.event.inputs.only_profile || 'all' }}'
          GFX='${{ github.event.inputs.gfx_target || 'gfx1151,gfx1150,gfx120X,gfx110X,gfx103X' }}'
          if [ "$REQ" = "latest" ]; then
            TAG="$(gh api repos/ggml-org/llama.cpp/releases/latest --jq .tag_name)"
          else
            TAG="$REQ"
          fi
          printf '%s' "$TAG" | grep -qE '^b[0-9]+$' || { echo "refusing non-release tag '$TAG'" >&2; exit 1; }
          COMMIT="$(gh api repos/ggml-org/llama.cpp/commits/"$TAG" --jq .sha)"

          # Only PUBLISHED releases count as "exists"; a leftover draft (from
          # a failed prior publish) should not block today's rebuild.
          EXISTS=false
          if [ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || true)" = "false" ]; then
            EXISTS=true
          fi

          # ubuntu-22.04 is x64 (glibc 2.35). arm64 only has ubuntu-24.04-arm
          # available on GitHub-hosted runners (glibc 2.39); Jimver's network
          # installer ships CUDA 13 for SBSA but not CUDA 12, so arm64 is
          # cuda13-only and we ship the single "portable" coverage class.
          ALL='[
            {"profile":"cuda12-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"older",   "rank":10,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89"},
            {"profile":"cuda12-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"newer",   "rank":20,"cuda":"12.8.0","toolkit_line":"12.8","archs":"86 89 90 100 120"},
            {"profile":"cuda12-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"portable","rank":30,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89 90 100 120"},
            {"profile":"cuda13-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"older",   "rank":40,"cuda":"13.0.0","toolkit_line":"13.0","archs":"75 80 86 89"},
            {"profile":"cuda13-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"newer",   "rank":50,"cuda":"13.0.0","toolkit_line":"13.0","archs":"86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"portable","rank":60,"cuda":"13.0.0","toolkit_line":"13.0","archs":"75 80 86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"arm64","runner":"ubuntu-24.04-arm","line":"cuda13","klass":"portable","rank":60,"cuda":"13.0.0","toolkit_line":"13.0","archs":"90 100 120 121"}
          ]'
          if [ "$ONLY" = "all" ]; then
            CUDA_INCLUDE="$(echo "$ALL" | jq -c .)"
          else
            CUDA_INCLUDE="$(echo "$ALL" | jq -c --arg p "$ONLY" '[.[] | select(.profile==$p)]')"
          fi
          # Windows CUDA reuses the x64 profiles (same arch lists / CUDA lines),
          # just on a Windows runner. arm64 has no Windows CUDA target.
          WIN_CUDA_INCLUDE="$(echo "$CUDA_INCLUDE" | jq -c '[.[] | select(.arch=="x64") | .runner="windows-2022"]')"
          [ -n "$GFX" ] || { echo "refusing empty gfx_target (would publish a CUDA-only release labeled CUDA + ROCm)" >&2; exit 1; }
          ROCM_MATRIX="$(jq -cn --arg g "$GFX" '{gfx_target: ($g | split(",") | map(gsub("^\\s+|\\s+$"; "")))}')"

          # macOS slices are static: two fixed runners with per-slice deployment
          # targets. arm64 pins 14.0 (floor of upstream's pre-macos-26 arm64
          # release); x64 pins 13.3 (matches upstream's Intel leg, covers 2017
          # Intel Macs capped at Ventura).
          MACOS_INCLUDE='[
            {"build":"arm64","runner":"macos-14",      "expect_arch":"arm64", "deploy_target":"14.0","defines":"-DGGML_METAL_USE_BF16=ON -DGGML_METAL_EMBED_LIBRARY=ON"},
            {"build":"x64",  "runner":"macos-15-intel","expect_arch":"x86_64","deploy_target":"13.3","defines":"-DGGML_METAL=OFF"}
          ]'
          MACOS_INCLUDE="$(echo "$MACOS_INCLUDE" | jq -c .)"

          {
            echo "tag=$TAG"
            echo "commit=$COMMIT"
            echo "exists=$EXISTS"
            echo "cuda_matrix={\"include\":$CUDA_INCLUDE}"
            echo "win_cuda_matrix={\"include\":$WIN_CUDA_INCLUDE}"
            echo "rocm_matrix=$ROCM_MATRIX"
            echo "macos_matrix={\"include\":$MACOS_INCLUDE}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $REQ -> $TAG ($COMMIT); release exists=$EXISTS; only=$ONLY; gfx=$GFX"

  build-cuda:
    name: CUDA
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cuda.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.cuda_matrix }}

  build-windows-cuda:
    name: Windows CUDA
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-windows-cuda.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.win_cuda_matrix }}

  build-rocm:
    name: ROCm
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-rocm.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      matrix: ${{ needs.resolve.outputs.rocm_matrix }}
      operating_systems: ${{ github.event.inputs.operating_systems || 'windows,ubuntu' }}
      rocm_version: ${{ github.event.inputs.rocm_version || 'latest' }}

  build-macos:
    name: macOS
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-macos.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      matrix: ${{ needs.resolve.outputs.macos_matrix }}

  assemble:
    name: Assemble metadata + publish
    needs: [resolve, build-cuda, build-windows-cuda, build-rocm, build-macos]
    # No `if: always()`. Atomicity: if any matrix entry in any child
    # workflow failed, the corresponding `build-*` job reports failure, the
    # default `needs` success check skips this assemble job, and nothing is
    # published. The installer needs the full bundle set or it'll fail.
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with:
          path: tooling

      # The first download attempt occasionally hits a transient ECONNRESET
      # on GitHub's ListArtifacts API. Retrying once is cheaper than
      # re-running the whole hour-long build matrix.
      - name: Download built bundles
        id: download
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      - name: Download built bundles (retry)
        if: steps.download.outcome == 'failure'
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      - name: Generate manifest + sha256 index
        run: |
          set -eux
          python3 tooling/scripts/unsloth/assemble_metadata.py \
            --tag '${{ needs.resolve.outputs.tag }}' \
            --commit '${{ needs.resolve.outputs.commit }}' \
            --dist dist --out dist \
            --publish-repo "$GITHUB_REPOSITORY"
          ls -la dist

      - name: Upload full release set (artifacts)
        uses: actions/upload-artifact@v6
        with:
          name: unsloth-prebuilt-${{ needs.resolve.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          # Short retention: the published GitHub release is the canonical
          # storage; this artifact is just debug fallback for failed-publish
          # runs. Default 90 days × ~8 GB/run is real storage cost.
          retention-days: 7

      - name: Publish GitHub release
        if: ${{ (github.event_name == 'schedule' || inputs.publish) && needs.resolve.outputs.exists != 'true' }}
        run: |
          set -eux
          TAG='${{ needs.resolve.outputs.tag }}'
          REPO="$GITHUB_REPOSITORY"

          # Atomic publish: upload as draft (hidden from the anon GitHub API
          # the installer uses), then flip draft=false only once every asset
          # landed. Leftover drafts from failed runs are detected as "not
          # exists" by resolve and rebuilt on the next run.
          if [ "$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq .isDraft 2>/dev/null || true)" = "true" ]; then
            gh release delete "$TAG" --repo "$REPO" --yes
          fi
          gh release create "$TAG" --repo "$REPO" --draft \
            --title "llama.cpp prebuilt $TAG" \
            --notes "Automated Unsloth llama.cpp CUDA (Linux + Windows) + ROCm + macOS prebuild for upstream $TAG (ggml-org/llama.cpp@${{ needs.resolve.outputs.commit }})." \
            dist/*
          gh release edit "$TAG" --repo "$REPO" --draft=false
