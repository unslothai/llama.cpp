name: Unsloth prebuilt (full release)

# Atomic daily build for unslothai/llama.cpp. One cron, one workflow run, one
# release per upstream b#### tag. Splits the heavy build work into four reusable
# children:
#   unsloth-prebuilt-cuda.yml          -- Linux CUDA bundles (x64 + arm64, matrix profiles)
#   unsloth-prebuilt-cuda-windows.yml  -- CUDA Windows bundles (x64, matrix profiles)
#   unsloth-prebuilt-rocm.yml          -- ROCm bundles (Windows + Ubuntu, per gfx target)
#   unsloth-prebuilt-macos.yml         -- macOS bundles (arm64 Metal + x64 CPU)
#
# Atomicity: the `assemble` job depends on all children. GitHub's default
# `needs` semantics require all needs to succeed -- if any matrix entry in
# any child fails, `assemble` skips and no release is published. The
# installer needs the full bundle set at the same tag or it'll dispatch to
# something that isn't there.
#
# Mix builds: scripts/unsloth/pr-set.json can list upstream PRs (each pinned
# to an exact commit) to merge into the build. `resolve` merges the open ones
# onto the base tag and uploads the merged tree as a workflow artifact that
# the children extract instead of cloning; the release is tagged
# b####-mix-<hash>. Empty list = vanilla upstream build.

on:
  schedule:
    - cron: '13 22 * * *'      # ~3PM San Francisco (UTC; not DST adjusted)
  workflow_dispatch:
    inputs:
      tag:
        description: 'ggml-org tag (b#### or "latest")'
        default: 'latest'
        required: true
        type: string
      min_age_hours:
        description: 'For "latest": only build a release public for at least this many hours (blank = default 6)'
        default: ''
        required: false
        type: string
      only_profile:
        description: 'CUDA profile to build'
        default: 'all'
        required: false
        type: choice
        options: [all, cuda12-older, cuda12-newer, cuda12-portable, cuda13-older, cuda13-newer, cuda13-portable]
      operating_systems:
        description: 'OSes for ROCm builds'
        default: 'windows,ubuntu'
        required: false
        type: string
      gfx_target:
        description: 'GPU targets for ROCm builds'
        default: 'gfx1151,gfx1150,gfx120X,gfx110X,gfx103X'
        required: false
        type: string
      rocm_version:
        description: 'ROCm version (or "latest")'
        default: 'latest'
        required: false
        type: string
      publish:
        description: 'Publish to GitHub Releases'
        default: false
        required: false
        type: boolean

permissions:
  contents: write

env:
  # Supply-chain aging: when resolving "latest", only build an upstream release
  # that has been public for at least this many hours, so a malicious or broken
  # release has time to be caught and yanked before we compile and ship it. An
  # explicit b#### tag (manual run) skips it. Per-run override via min_age_hours.
  UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS: "6"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || 'scheduled' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-22.04
    # Read-only: resolve merges third-party PR content but pushes nothing;
    # only assemble needs the workflow-level contents:write (publish).
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      ref: ${{ steps.r.outputs.ref }}
      repo: ${{ steps.r.outputs.repo }}
      base: ${{ steps.r.outputs.base }}
      prs: ${{ steps.r.outputs.prs }}
      source_artifact: ${{ steps.r.outputs.source_artifact }}
      commit: ${{ steps.r.outputs.commit }}
      exists: ${{ steps.r.outputs.exists }}
      cuda_matrix: ${{ steps.r.outputs.cuda_matrix }}
      win_cuda_matrix: ${{ steps.r.outputs.win_cuda_matrix }}
      rocm_matrix: ${{ steps.r.outputs.rocm_matrix }}
      macos_matrix: ${{ steps.r.outputs.macos_matrix }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Shallow by default (only pr-set.json is needed); a mix build unshallows
      # in-place to merge the PRs.
      - name: Checkout (pr-set.json + mix merge workspace)
        uses: actions/checkout@v6
      - id: r
        run: |
          set -euo pipefail
          REQ='${{ github.event.inputs.tag || 'latest' }}'
          ONLY='${{ github.event.inputs.only_profile || 'all' }}'
          GFX_DEFAULT='gfx1151,gfx1150,gfx120X,gfx110X,gfx103X'
          GFX='${{ github.event.inputs.gfx_target }}'; GFX="${GFX:-$GFX_DEFAULT}"
          OS_LIST='${{ github.event.inputs.operating_systems || 'windows,ubuntu' }}'
          AGE_H='${{ github.event.inputs.min_age_hours }}'

          # publish does delete-then-create on the whole release, and the installer
          # treats the published manifest as the authoritative bundle set: a partial
          # build drops bundles and silently downgrades uncovered hosts to slow
          # source builds. Refuse to publish unless the full default set is built;
          # publish=false test runs may use subsets.
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.publish }}" = "true" ]; then
            [ "$ONLY" = "all" ] || { echo "refusing to publish only_profile=$ONLY: a partial CUDA set clobbers manifest coverage. Use only_profile=all to publish, or publish=false for an artifact-only test." >&2; exit 1; }
            [ "$GFX" = "$GFX_DEFAULT" ] || { echo "refusing to publish gfx_target='$GFX': publish requires the full default set ($GFX_DEFAULT); use publish=false for a subset test." >&2; exit 1; }
            case "$OS_LIST" in
              *windows*ubuntu*|*ubuntu*windows*) : ;;
              *) echo "refusing to publish operating_systems='$OS_LIST': both windows and ubuntu ROCm bundles are required. Use publish=false for a subset test." >&2; exit 1 ;;
            esac
          fi
          [ -n "$AGE_H" ] || AGE_H="${UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS:-6}"
          if [ "$REQ" = "latest" ]; then
            # Newest published (non-draft, non-prerelease) release that has been
            # public for >= AGE_H hours -- the supply-chain aging window. GitHub
            # does not guarantee the list order, so pick the max by published_at
            # explicitly rather than trusting `first`.
            CUTOFF="$(date -u -d "-${AGE_H} hours" +%s)"
            BASE="$(gh api 'repos/ggml-org/llama.cpp/releases?per_page=100' \
              --jq "[.[] | select(.draft==false and .prerelease==false) | select((.published_at|fromdateiso8601) <= ${CUTOFF})] | max_by(.published_at|fromdateiso8601) | .tag_name")"
            if [ -z "$BASE" ] || [ "$BASE" = "null" ]; then
              echo "refusing: no ggml-org release older than ${AGE_H}h in the last 100 releases" >&2
              exit 1
            fi
            echo "selected $BASE (aged >= ${AGE_H}h)"
          else
            BASE="$REQ"   # explicit b#### override skips the aging filter
          fi
          printf '%s' "$BASE" | grep -qE '^b[0-9]+$' || { echo "refusing non-release tag '$BASE'" >&2; exit 1; }

          # Resolve the PR mix set (scripts/unsloth/pr-set.json): upstream PR
          # commit urls. Pins are mandatory -- only an exact, reviewed commit
          # is ever built, so a PR author pushing more commits cannot change
          # what the nightly ships. Non-open PRs are skipped, so merged or
          # abandoned entries rot away harmlessly instead of breaking the
          # nightly. unsloth-pr-set-lint.yml runs these same checks (plus pin
          # membership) on every push that edits the file.
          jq -e '.prs | type == "array" and all(.[]; type == "string")' scripts/unsloth/pr-set.json >/dev/null \
            || { echo "scripts/unsloth/pr-set.json: .prs must be an array of PR url strings" >&2; exit 1; }
          PRS='[]'
          URL_RE='^https://github\.com/ggml-org/llama\.cpp/pull/([0-9]+)/commits/([0-9a-f]{40})/?$'
          for url in $(jq -r '.prs[]' scripts/unsloth/pr-set.json); do
            [[ "$url" =~ $URL_RE ]] || { echo "refusing malformed PR url '$url' (expected https://github.com/ggml-org/llama.cpp/pull/<n>/commits/<40-hex-sha>)" >&2; exit 1; }
            NUM="${BASH_REMATCH[1]}"; SHA="${BASH_REMATCH[2]}"
            # plain assignment first so a gh failure aborts the run (set -e)
            # instead of being swallowed by read and silently skipping the PR
            STATE_HEAD="$(gh api "repos/ggml-org/llama.cpp/pulls/${NUM}" --jq '.state + " " + .head.sha')"
            read -r STATE HEAD <<<"$STATE_HEAD"
            if [ "$STATE" != "open" ]; then
              echo "skipping PR #${NUM} (${STATE}): $url"
              continue
            fi
            [ "$SHA" = "$HEAD" ] || echo "note: PR #${NUM} is pinned to ${SHA} but its head has moved to ${HEAD}"
            echo "including PR #${NUM} @ ${SHA}"
            PRS="$(jq -c --arg n "$NUM" --arg s "$SHA" --arg u "$url" '. + [{number: ($n|tonumber), sha: $s, url: $u}]' <<<"$PRS")"
          done

          SRC_ARTIFACT=""
          if [ "$(jq length <<<"$PRS")" = 0 ]; then
            TAG="$BASE"
            REPO='ggml-org/llama.cpp'
            REF="refs/tags/${TAG}"
            COMMIT="$(gh api repos/ggml-org/llama.cpp/commits/"$BASE" --jq .sha)"
          else
            # Merge the set onto the base once, here, and ship the merged tree
            # to the build children as a workflow artifact: one merge, identical
            # trees everywhere, nothing pushed to the repo (GITHUB_TOKEN may
            # never push commits touching .github/workflows, which upstream
            # history routinely does). The synthetic tag embeds a hash of the
            # pinned SHAs in listed order (merge order can matter for
            # conflicts), so a pin update or a reorder yields a new tag and
            # build, while the release "exists" check below still skips
            # rebuilding an already-published set.
            SETHASH="$(jq -r 'map("\(.number):\(.sha)") | join("\n")' <<<"$PRS" | sha256sum | cut -c1-7)"
            TAG="${BASE}-mix-${SETHASH}"
            # REPO names where this source is published, for provenance
            # metadata: the merged tree exists only as this repo's release
            # assets, never upstream. Children ignore repo in mix mode (they
            # extract the artifact instead of cloning).
            REPO="$GITHUB_REPOSITORY"
            REF=""
            SRC_ARTIFACT="app-source-${TAG}"
            if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
              git fetch -q --unshallow --no-tags origin
            fi
            git remote add upstream https://github.com/ggml-org/llama.cpp.git
            git fetch -q --no-tags upstream "refs/tags/${BASE}:refs/tags/${BASE}"
            git checkout -q --detach "refs/tags/${BASE}"
            for pair in $(jq -r '.[] | "\(.number):\(.sha)"' <<<"$PRS"); do
              NUM="${pair%%:*}"; SHA="${pair##*:}"
              git fetch -q --no-tags upstream "$SHA" \
                || { echo "could not fetch commit ${SHA} for PR #${NUM}; it may have been pruned after a force-push -- update or remove the pin in scripts/unsloth/pr-set.json" >&2; exit 1; }
              git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                merge --no-ff --no-edit -m "Merge ggml-org/llama.cpp#${NUM} @ ${SHA}" "$SHA" \
                || { echo "PR #${NUM} (${SHA}) does not merge cleanly onto ${BASE} + the PRs listed before it; reorder or drop it in scripts/unsloth/pr-set.json" >&2; exit 1; }
            done
            COMMIT="$(git rev-parse HEAD)"

            # The tarball ships without .git, where cmake/build-info.cmake falls
            # back to its defaults; bake real values into those defaults so
            # llama-server --version doesn't report b0 (unknown). The build
            # number stays the BASE's b#### number (not the merged commit
            # count), so anything comparing versions against upstream releases
            # keeps working; BUILD_COMMIT identifies the merged head.
            COUNT="${BASE#b}"
            SHORT="$(git rev-parse --short HEAD)"
            sed -i "s/^set(BUILD_NUMBER 0)$/set(BUILD_NUMBER ${COUNT})/" cmake/build-info.cmake
            sed -i "s/^set(BUILD_COMMIT \"unknown\")$/set(BUILD_COMMIT \"${SHORT}\")/" cmake/build-info.cmake
            grep -q "set(BUILD_NUMBER ${COUNT})" cmake/build-info.cmake \
              && grep -q "set(BUILD_COMMIT \"${SHORT}\")" cmake/build-info.cmake \
              || { echo "cmake/build-info.cmake no longer has the expected fallback lines; cannot bake the build number into the source artifact" >&2; exit 1; }

            tar -czf "${RUNNER_TEMP}/llama.cpp-source-${TAG}.tar.gz" --exclude-vcs --transform "s,^\.,llama.cpp-${TAG}," .
            echo "merged ${TAG} (${COMMIT}, build ${COUNT})"
          fi

          # Only PUBLISHED releases count as "exists"; a leftover draft (from
          # a failed prior publish) should not block today's rebuild.
          EXISTS=false
          if [ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || true)" = "false" ]; then
            EXISTS=true
          fi

          # ubuntu-22.04 is x64 (glibc 2.35). arm64 only has ubuntu-24.04-arm
          # available on GitHub-hosted runners (glibc 2.39). arm64 is cuda13-only
          # (no cuda12 SBSA) and ships the single "portable" coverage class.
          # cuda12 installs via Jimver; cuda13 is pinned to 13.3 (matching
          # upstream) which Jimver lacks, so those install via NVIDIA redist in
          # the build children -- on the same runners, so the glibc floor holds.
          ALL='[
            {"profile":"cuda12-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"older",   "rank":10,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89"},
            {"profile":"cuda12-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"newer",   "rank":20,"cuda":"12.8.0","toolkit_line":"12.8","archs":"86 89 90 100 120"},
            {"profile":"cuda12-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"portable","rank":30,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89 90 100 120"},
            {"profile":"cuda13-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"older",   "rank":40,"cuda":"13.3","toolkit_line":"13.3","archs":"75 80 86 89"},
            {"profile":"cuda13-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"newer",   "rank":50,"cuda":"13.3","toolkit_line":"13.3","archs":"86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"portable","rank":60,"cuda":"13.3","toolkit_line":"13.3","archs":"75 80 86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"arm64","runner":"ubuntu-24.04-arm","line":"cuda13","klass":"portable","rank":60,"cuda":"13.3","toolkit_line":"13.3","archs":"90 100 120 121"}
          ]'
          if [ "$ONLY" = "all" ]; then
            CUDA_INCLUDE="$(echo "$ALL" | jq -c .)"
          else
            CUDA_INCLUDE="$(echo "$ALL" | jq -c --arg p "$ONLY" '[.[] | select(.profile==$p)]')"
          fi
          # CUDA Windows reuses the x64 profiles (same arch lists / CUDA
          # versions), just on a Windows runner. arm64 has no CUDA Windows target.
          WIN_CUDA_INCLUDE="$(echo "$CUDA_INCLUDE" | jq -c '[.[] | select(.arch=="x64") | .runner="windows-2022"]')"
          [ -n "$GFX" ] || { echo "refusing empty gfx_target (would publish a CUDA-only release labeled CUDA + ROCm)" >&2; exit 1; }
          ROCM_MATRIX="$(jq -cn --arg g "$GFX" '{gfx_target: ($g | split(",") | map(gsub("^\\s+|\\s+$"; "")))}')"

          # macOS slices are static: two fixed runners with per-slice deployment
          # targets. arm64 builds on macos-26 (newest Metal SDK; avoids the
          # M5/A19 "error compiling source" the macos-14 SDK emits) yet pins
          # minos 14.0 via deploy_target, so it still loads on macOS 14+. x64
          # pins 13.3 (matches upstream's Intel leg, covers 2017 Intel Macs
          # capped at Ventura).
          MACOS_INCLUDE='[
            {"build":"arm64","runner":"macos-26",      "expect_arch":"arm64", "deploy_target":"14.0","defines":"-DGGML_METAL_USE_BF16=ON -DGGML_METAL_EMBED_LIBRARY=ON"},
            {"build":"x64",  "runner":"macos-15-intel","expect_arch":"x86_64","deploy_target":"13.3","defines":"-DGGML_METAL=OFF"}
          ]'
          MACOS_INCLUDE="$(echo "$MACOS_INCLUDE" | jq -c .)"

          {
            echo "tag=$TAG"
            echo "ref=$REF"
            echo "repo=$REPO"
            echo "base=$BASE"
            echo "prs=$PRS"
            echo "source_artifact=$SRC_ARTIFACT"
            echo "commit=$COMMIT"
            echo "exists=$EXISTS"
            echo "cuda_matrix={\"include\":$CUDA_INCLUDE}"
            echo "win_cuda_matrix={\"include\":$WIN_CUDA_INCLUDE}"
            echo "rocm_matrix=$ROCM_MATRIX"
            echo "macos_matrix={\"include\":$MACOS_INCLUDE}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $REQ -> $TAG ($COMMIT); prs=$PRS; source_artifact=${SRC_ARTIFACT:-none}; release exists=$EXISTS; only=$ONLY; gfx=$GFX"

      # The merged source for mix builds: every build child extracts this
      # instead of cloning, and assemble ships it as the release's
      # source-tarball asset (the merged commit exists in no repo).
      - name: Upload merged source artifact
        if: steps.r.outputs.source_artifact != ''
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.r.outputs.source_artifact }}
          path: ${{ runner.temp }}/llama.cpp-source-${{ steps.r.outputs.tag }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-cuda:
    name: CUDA
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cuda.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      ref: ${{ needs.resolve.outputs.ref }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.cuda_matrix }}

  build-windows-cuda:
    name: CUDA Windows
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cuda-windows.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      ref: ${{ needs.resolve.outputs.ref }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.win_cuda_matrix }}

  build-rocm:
    name: ROCm
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-rocm.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      ref: ${{ needs.resolve.outputs.ref }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      matrix: ${{ needs.resolve.outputs.rocm_matrix }}
      operating_systems: ${{ github.event.inputs.operating_systems || 'windows,ubuntu' }}
      rocm_version: ${{ github.event.inputs.rocm_version || 'latest' }}

  build-macos:
    name: macOS
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-macos.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      ref: ${{ needs.resolve.outputs.ref }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      matrix: ${{ needs.resolve.outputs.macos_matrix }}

  assemble:
    name: Assemble metadata + publish
    needs: [resolve, build-cuda, build-windows-cuda, build-rocm, build-macos]
    # No `if: always()`. Atomicity: if any matrix entry in any child
    # workflow failed, the corresponding `build-*` job reports failure, the
    # default `needs` success check skips this assemble job, and nothing is
    # published. The installer needs the full bundle set or it'll fail.
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with:
          path: tooling

      # The first download attempt occasionally hits a transient ECONNRESET
      # on GitHub's ListArtifacts API. Retrying once is cheaper than
      # re-running the whole hour-long build matrix.
      - name: Download built bundles
        id: download
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      - name: Download built bundles (retry)
        if: steps.download.outcome == 'failure'
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      # Ship the source tarballs as release assets so the installer's
      # source-build fallback has a tree to fetch. Downloaded into dist/ (not
      # self-tarred) so the published bytes match the sha256 index, which
      # assemble_metadata records by hashing these exact local files. For mix
      # builds the tag-named tarball arrives in dist/ via the resolve job's
      # app-source-* artifact (the merged tree is in no repo); the exact-source
      # asset is the same bytes under the commit name.
      - name: Fetch source archives
        run: |
          set -eux
          TAG='${{ needs.resolve.outputs.tag }}'
          REF='${{ needs.resolve.outputs.ref }}'
          REPO='${{ needs.resolve.outputs.repo }}'
          SHA='${{ needs.resolve.outputs.commit }}'
          mkdir -p dist
          if [ -n '${{ needs.resolve.outputs.source_artifact }}' ]; then
            cp "dist/llama.cpp-source-${TAG}.tar.gz" "dist/llama.cpp-source-commit-${SHA}.tar.gz"
          else
            curl -fL --retry 3 -o "dist/llama.cpp-source-${TAG}.tar.gz" \
              "https://codeload.github.com/${REPO}/tar.gz/${REF}"
            curl -fL --retry 3 -o "dist/llama.cpp-source-commit-${SHA}.tar.gz" \
              "https://codeload.github.com/${REPO}/tar.gz/${SHA}"
          fi

      - name: Generate manifest + sha256 index
        run: |
          set -eux
          python3 tooling/scripts/unsloth/assemble_metadata.py \
            --tag '${{ needs.resolve.outputs.tag }}' \
            --ref '${{ needs.resolve.outputs.ref }}' \
            --source-repo '${{ needs.resolve.outputs.repo }}' \
            --base-tag '${{ needs.resolve.outputs.base }}' \
            --pr-set '${{ needs.resolve.outputs.prs }}' \
            --commit '${{ needs.resolve.outputs.commit }}' \
            --dist dist --out dist \
            --publish-repo "$GITHUB_REPOSITORY"
          ls -la dist

      - name: Upload full release set (artifacts)
        uses: actions/upload-artifact@v6
        with:
          name: unsloth-prebuilt-${{ needs.resolve.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          # Short retention: the published GitHub release is the canonical
          # storage; this artifact is just debug fallback for failed-publish
          # runs. Default 90 days × ~8 GB/run is real storage cost.
          retention-days: 7

      - name: Verify full bundle coverage before publish
        if: ${{ (github.event_name == 'schedule' || inputs.publish) && needs.resolve.outputs.exists != 'true' }}
        run: |
          set -eu
          TAG='${{ needs.resolve.outputs.tag }}'
          fail=0
          # A partial CUDA set (cuda13 without cuda12) silently strands the
          # cuda12-runtime majority; require matching x64 coverage on both lines.
          for os in linux windows; do
            ext=$([ "$os" = windows ] && echo zip || echo tar.gz)
            c12=$(ls dist/app-*-"$os"-x64-cuda12-*."$ext" 2>/dev/null | sed -E 's/.*cuda12-(older|newer|portable)\..*/\1/' | sort -u | paste -sd, -)
            c13=$(ls dist/app-*-"$os"-x64-cuda13-*."$ext" 2>/dev/null | sed -E 's/.*cuda13-(older|newer|portable)\..*/\1/' | sort -u | paste -sd, -)
            echo "$os x64 coverage: cuda12=[$c12] cuda13=[$c13]"
            [ -n "$c12" ] && [ "$c12" = "$c13" ] || { echo "ERROR: $os x64 cuda12/cuda13 coverage mismatch" >&2; fail=1; }
          done
          # Children passing is not the same as files landing in dist/ (a
          # download-artifact anomaly leaves green jobs and missing bundles),
          # so assert presence of every non-CUDA-x64 line the installer
          # selects from. The resolve-time input guard already pins publish
          # runs to the full default matrix, so these names are exact.
          for f in \
            "llama-${TAG}-bin-macos-arm64.tar.gz" \
            "llama-${TAG}-bin-macos-x64.tar.gz" \
            "app-${TAG}-linux-arm64-cuda13-portable.tar.gz"; do
            [ -s "dist/$f" ] || { echo "ERROR: missing $f in dist/" >&2; fail=1; }
          done
          # Default ROCm set (mirrors the gfx_target input default): both OSes
          # per family, or AMD hosts of that family silently lose their bundle.
          for gfx in gfx1151 gfx1150 gfx120X gfx110X gfx103X; do
            [ -s "dist/app-${TAG}-linux-x64-rocm-${gfx}.tar.gz" ] || { echo "ERROR: missing linux rocm ${gfx} bundle in dist/" >&2; fail=1; }
            [ -s "dist/app-${TAG}-windows-x64-rocm-${gfx}.zip" ]  || { echo "ERROR: missing windows rocm ${gfx} bundle in dist/" >&2; fail=1; }
          done
          [ "$fail" = 0 ] || { echo "ERROR: refusing to publish a partial release" >&2; exit 1; }

      - name: Publish GitHub release
        if: ${{ (github.event_name == 'schedule' || inputs.publish) && needs.resolve.outputs.exists != 'true' }}
        run: |
          set -eux
          TAG='${{ needs.resolve.outputs.tag }}'
          REPO="$GITHUB_REPOSITORY"
          PRS='${{ needs.resolve.outputs.prs }}'
          SRC="upstream ${{ needs.resolve.outputs.base }}"
          [ "$(jq length <<<"$PRS")" = 0 ] || SRC="$SRC + $(jq -r 'map("PR #\(.number) @ \(.sha[0:7])") | join(", ")' <<<"$PRS")"

          # Atomic publish: upload as draft (hidden from the anon GitHub API
          # the installer uses), then flip draft=false only once every asset
          # landed. Leftover drafts from failed runs are detected as "not
          # exists" by resolve and rebuilt on the next run.
          if [ "$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq .isDraft 2>/dev/null || true)" = "true" ]; then
            gh release delete "$TAG" --repo "$REPO" --yes
          fi
          gh release create "$TAG" --repo "$REPO" --draft \
            --title "llama.cpp prebuilt $TAG" \
            --notes "Automated Unsloth llama.cpp CUDA (Linux + Windows) + ROCm + macOS prebuild for $SRC (${{ needs.resolve.outputs.repo }}@${{ needs.resolve.outputs.commit }})." \
            dist/*
          gh release edit "$TAG" --repo "$REPO" --draft=false
