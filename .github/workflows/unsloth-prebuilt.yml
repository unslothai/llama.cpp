name: Unsloth prebuilt (full release)

# Atomic daily build for unslothai/llama.cpp. One cron, one workflow run, one
# release per upstream b#### tag. Splits the heavy build work into six reusable
# children:
#   unsloth-prebuilt-cuda.yml          -- Linux CUDA bundles (x64 + arm64, matrix profiles)
#   unsloth-prebuilt-cuda-windows.yml  -- CUDA Windows bundles (x64, matrix profiles)
#   unsloth-prebuilt-rocm.yml          -- ROCm bundles (Windows + Ubuntu, per gfx target)
#   unsloth-prebuilt-macos.yml         -- macOS bundles (arm64 Metal + x64 CPU)
#   unsloth-prebuilt-cpu.yml           -- CPU-only bundles (Linux + Windows, x64 + arm64)
#   unsloth-prebuilt-vulkan.yml        -- Vulkan bundles (Linux + Windows, x64)
#
# Atomicity: the `assemble` job depends on all children. GitHub's default
# `needs` semantics require all needs to succeed -- if any matrix entry in
# any child fails, `assemble` skips and no release is published. The
# installer needs the full bundle set at the same tag or it'll dispatch to
# something that isn't there.
#
# Mix builds: scripts/unsloth/pr-set.json can list ggml-org/llama.cpp or
# unslothai/llama.cpp PRs (each pinned to an exact commit) to merge into the
# build. `resolve` merges the open ones onto the base tag and uploads the
# merged tree as a workflow artifact that the children extract instead of
# cloning; the release is tagged b####-mix-<hash>. Empty list = vanilla
# upstream build.

on:
  schedule:
    - cron: '13 20 * * *'      # ~1PM San Francisco PDT / ~12PM PST (UTC; not DST adjusted)
  workflow_dispatch:
    inputs:
      tag:
        description: 'ggml-org tag (b#### or "latest")'
        default: 'latest'
        required: true
        type: string
      min_age_hours:
        description: 'For "latest": only build a release public for at least this many hours (blank = default 6)'
        default: ''
        required: false
        type: string
      only_profile:
        description: 'CUDA profile to build'
        default: 'all'
        required: false
        type: choice
        options: [all, cuda12-legacy, cuda12-older, cuda12-newer, cuda12-portable, cuda13-older, cuda13-newer, cuda13-portable]
      operating_systems:
        description: 'OSes for ROCm builds'
        default: 'windows,ubuntu'
        required: false
        type: string
      gfx_target:
        description: 'GPU targets for ROCm builds'
        default: 'gfx1151,gfx1150,gfx120X,gfx110X,gfx103X,gfx90a,gfx908'
        required: false
        type: string
      rocm_version:
        description: 'ROCm version (or "latest")'
        default: 'latest'
        required: false
        type: string
      publish:
        description: 'Publish to GitHub Releases'
        default: false
        required: false
        type: boolean

permissions:
  contents: write

env:
  # Supply-chain aging: when resolving "latest", only build an upstream release
  # that has been public for at least this many hours, so a malicious or broken
  # release has time to be caught and yanked before we compile and ship it. An
  # explicit b#### tag (manual run) skips it. Per-run override via min_age_hours.
  UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS: "6"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || 'scheduled' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-22.04
    # Read-only: resolve merges third-party PR content but pushes nothing;
    # only assemble needs the workflow-level contents:write (publish).
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      repo: ${{ steps.r.outputs.repo }}
      base: ${{ steps.r.outputs.base }}
      prs: ${{ steps.r.outputs.prs }}
      source_artifact: ${{ steps.r.outputs.source_artifact }}
      commit: ${{ steps.r.outputs.commit }}
      exists: ${{ steps.r.outputs.exists }}
      cuda_matrix: ${{ steps.r.outputs.cuda_matrix }}
      win_cuda_matrix: ${{ steps.r.outputs.win_cuda_matrix }}
      rocm_matrix: ${{ steps.r.outputs.rocm_matrix }}
      macos_matrix: ${{ steps.r.outputs.macos_matrix }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Shallow by default (only pr-set.json is needed); a mix build unshallows
      # in-place to merge the PRs.
      - name: Checkout (pr-set.json + mix merge workspace)
        uses: actions/checkout@v6
      - id: r
        run: |
          set -euo pipefail
          REQ='${{ github.event.inputs.tag || 'latest' }}'
          ONLY='${{ github.event.inputs.only_profile || 'all' }}'
          GFX_DEFAULT='gfx1151,gfx1150,gfx120X,gfx110X,gfx103X,gfx90a,gfx908'
          GFX='${{ github.event.inputs.gfx_target }}'; GFX="${GFX:-$GFX_DEFAULT}"
          OS_LIST='${{ github.event.inputs.operating_systems || 'windows,ubuntu' }}'
          AGE_H='${{ github.event.inputs.min_age_hours }}'

          # publish does delete-then-create on the whole release, and the installer
          # treats the published manifest as the authoritative bundle set: a partial
          # build drops bundles and silently downgrades uncovered hosts to slow
          # source builds. Refuse to publish unless the full default set is built;
          # publish=false test runs may use subsets.
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.publish }}" = "true" ]; then
            [ "$ONLY" = "all" ] || { echo "refusing to publish only_profile=$ONLY: a partial CUDA set clobbers manifest coverage. Use only_profile=all to publish, or publish=false for an artifact-only test." >&2; exit 1; }
            [ "$GFX" = "$GFX_DEFAULT" ] || { echo "refusing to publish gfx_target='$GFX': publish requires the full default set ($GFX_DEFAULT); use publish=false for a subset test." >&2; exit 1; }
            case "$OS_LIST" in
              *windows*ubuntu*|*ubuntu*windows*) : ;;
              *) echo "refusing to publish operating_systems='$OS_LIST': both windows and ubuntu ROCm bundles are required. Use publish=false for a subset test." >&2; exit 1 ;;
            esac
          fi
          [ -n "$AGE_H" ] || AGE_H="${UNSLOTH_LLAMA_MIN_RELEASE_AGE_HOURS:-6}"
          if [ "$REQ" = "latest" ]; then
            # Newest published (non-draft, non-prerelease) release that has been
            # public for >= AGE_H hours -- the supply-chain aging window. GitHub
            # does not guarantee the list order, so pick the max by published_at
            # explicitly rather than trusting `first`.
            CUTOFF="$(date -u -d "-${AGE_H} hours" +%s)"
            BASE="$(gh api 'repos/ggml-org/llama.cpp/releases?per_page=100' \
              --jq "[.[] | select(.draft==false and .prerelease==false) | select((.published_at|fromdateiso8601) <= ${CUTOFF})] | max_by(.published_at|fromdateiso8601) | .tag_name")"
            if [ -z "$BASE" ] || [ "$BASE" = "null" ]; then
              echo "refusing: no ggml-org release older than ${AGE_H}h in the last 100 releases" >&2
              exit 1
            fi
            echo "selected $BASE (aged >= ${AGE_H}h)"
          else
            BASE="$REQ"   # explicit b#### override skips the aging filter
          fi
          printf '%s' "$BASE" | grep -qE '^b[0-9]+$' || { echo "refusing non-release tag '$BASE'" >&2; exit 1; }

          # Resolve the PR mix set (scripts/unsloth/pr-set.json): PR commit
          # urls from ggml-org/llama.cpp or unslothai/llama.cpp (no other
          # repos). Pins are mandatory -- only an exact, reviewed commit
          # is ever built, so a PR author pushing more commits cannot change
          # what the nightly ships. Non-open PRs are skipped, so merged or
          # abandoned entries rot away instead of breaking the nightly (but a
          # merged unslothai pin drops out of the build entirely; see the
          # pr-set.json _doc). unsloth-pr-set-lint.yml runs the same checks on every
          # push that edits the file, but that is only a tripwire -- a red
          # lint does not stop the schedule, so the gate must live here.
          jq -e '.prs | type == "array" and all(.[]; type == "string")' scripts/unsloth/pr-set.json >/dev/null \
            || { echo "scripts/unsloth/pr-set.json: .prs must be an array of PR url strings" >&2; exit 1; }
          PRS='[]'
          URL_RE='^https://github\.com/(ggml-org|unslothai)/llama\.cpp/pull/([0-9]+)/commits/([0-9a-f]{40})/?$'
          for url in $(jq -r '.prs[]' scripts/unsloth/pr-set.json); do
            [[ "$url" =~ $URL_RE ]] || { echo "refusing malformed PR url '$url' (expected https://github.com/{ggml-org,unslothai}/llama.cpp/pull/<n>/commits/<40-hex-sha>)" >&2; exit 1; }
            SRC="${BASH_REMATCH[1]}/llama.cpp"; NUM="${BASH_REMATCH[2]}"; SHA="${BASH_REMATCH[3]}"
            # Abort naming the entry on a gh failure (typo'd numbers 404).
            # Title can contain spaces, so it can't ride a space-delimited
            # read -- pull each field out on its own.
            PR_JSON="$(gh api "repos/${SRC}/pulls/${NUM}")" \
              || { echo "refusing ${SRC}#${NUM}: could not fetch PR metadata (nonexistent PR number in '$url', or a transient API failure); fix the pin in scripts/unsloth/pr-set.json or retry" >&2; exit 1; }
            STATE="$(jq -r '.state' <<<"$PR_JSON")"
            HEAD="$(jq -r '.head.sha' <<<"$PR_JSON")"
            N_COMMITS="$(jq -r '.commits' <<<"$PR_JSON")"
            TITLE="$(jq -r '.title' <<<"$PR_JSON")"
            if [ "$STATE" != "open" ]; then
              echo "skipping ${SRC}#${NUM} (${STATE}): $url"
              continue
            fi
            # A pin pasted from the wrong PR would build arbitrary code while
            # the manifest blames PR #<num>; require the pinned commit to be
            # a commit of that PR. The commits listing is capped at 250 by
            # the API; past that, skip rather than false-fail.
            if [ "$N_COMMITS" -gt 250 ]; then
              echo "note: ${SRC}#${NUM} has ${N_COMMITS} commits (over the API listing cap); skipping pin membership check"
            elif ! gh api "repos/${SRC}/pulls/${NUM}/commits" --paginate --jq '.[].sha' | grep -qx "$SHA"; then
              echo "refusing ${SRC}#${NUM}: pinned commit ${SHA} is not a commit of that PR (wrong paste, or force-pushed away); fix the pin in scripts/unsloth/pr-set.json" >&2
              exit 1
            fi
            [ "$SHA" = "$HEAD" ] || echo "note: ${SRC}#${NUM} is pinned to ${SHA} but its head has moved to ${HEAD}"
            echo "including ${SRC}#${NUM} @ ${SHA}"
            PRS="$(jq -c --arg r "$SRC" --arg n "$NUM" --arg s "$SHA" --arg u "$url" --arg t "$TITLE" '. + [{repo: $r, number: ($n|tonumber), sha: $s, url: $u, title: $t}]' <<<"$PRS")"
          done

          # Decide the tag and source repo first; the source tree is built
          # further down, only if this release isn't already published.
          if [ "$(jq length <<<"$PRS")" = 0 ]; then
            # Plain build: pristine upstream base, no merge. REPO stays the real
            # upstream repo even though we ship our own stamped tarball.
            TAG="$BASE"
            REPO='ggml-org/llama.cpp'
          else
            # The synthetic tag embeds a hash of the pinned repo#number:sha
            # triples in listed order (merge order can matter for conflicts), so
            # a pin update or a reorder yields a new tag and build, while the
            # "exists" check below still skips rebuilding an already-published
            # set. The repo is part of the key so PR #n in the two repos can't
            # hash to the same set. The merged tree exists only as this repo's
            # release assets, never upstream.
            SETHASH="$(jq -r 'map("\(.repo)#\(.number):\(.sha)") | join("\n")' <<<"$PRS" | sha256sum | cut -c1-7)"
            TAG="${BASE}-mix-${SETHASH}"
            REPO="$GITHUB_REPOSITORY"
          fi
          SRC_ARTIFACT="app-source-${TAG}"
          COMMIT=""

          # Only PUBLISHED releases count as "exists"; a leftover draft (from
          # a failed prior publish) should not block today's rebuild.
          EXISTS=false
          if [ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || true)" = "false" ]; then
            EXISTS=true
          fi

          # Build the source tree every child compiles, ONCE, here -- but only
          # when something will actually be built. On a scheduled no-op (the aged
          # "latest" was already published) skip the whole checkout/merge/tar +
          # upload; a manual dispatch always rebuilds. Check out the upstream base,
          # merge any pinned PRs (mix builds), then bake the build number/commit
          # and the Unsloth fingerprint into cmake/build-info.cmake. The
          # result is uploaded as the app-source-* artifact every child extracts --
          # one identical tree everywhere, no child clones, fingerprint patch in one
          # place. Nothing is pushed (GITHUB_TOKEN may never push commits touching
          # .github/workflows, which upstream history routinely does).
          if [ "$EXISTS" != "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git remote add upstream https://github.com/ggml-org/llama.cpp.git
            if [ "$(jq length <<<"$PRS")" != 0 ]; then
              # Merges need a merge-base, so unshallow first.
              if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
                git fetch -q --unshallow --no-tags origin
              fi
              git fetch -q --no-tags upstream "refs/tags/${BASE}:refs/tags/${BASE}"
              git checkout -q --detach "refs/tags/${BASE}"
              # Each pin is fetched from the repo its PR lives in (repo/number/
              # sha are machine fields, so the space-delimited read is safe;
              # titles stay out of this loop).
              while read -r SRC NUM SHA; do
                git fetch -q --no-tags "https://github.com/${SRC}.git" "$SHA" \
                  || { echo "could not fetch commit ${SHA} for ${SRC}#${NUM}; it may have been pruned after a force-push -- update or remove the pin in scripts/unsloth/pr-set.json" >&2; exit 1; }
                git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                  merge --no-ff --no-edit -m "Merge ${SRC}#${NUM} @ ${SHA}" "$SHA" \
                  || { echo "${SRC}#${NUM} (${SHA}) does not merge cleanly onto ${BASE} + the PRs listed before it; reorder or drop it in scripts/unsloth/pr-set.json" >&2; exit 1; }
              done < <(jq -r '.[] | "\(.repo) \(.number) \(.sha)"' <<<"$PRS")
            else
              # Plain build: only the base tree is needed. Shallow is fine -- the
              # build number is baked below, so no git history is needed at build time.
              git fetch -q --depth 1 --no-tags upstream "refs/tags/${BASE}:refs/tags/${BASE}"
              git checkout -q --detach "refs/tags/${BASE}"
            fi
            COMMIT="$(git rev-parse HEAD)"

            # The tarball ships without .git, where cmake/build-info.cmake falls
            # back to its defaults; bake real values into those defaults so
            # llama-server --version doesn't report b0 (unknown). The build number
            # stays the BASE's b#### number (the upstream tag's commit count), so
            # anything comparing versions against upstream releases keeps working;
            # BUILD_COMMIT identifies the (possibly merged) head.
            COUNT="${BASE#b}"
            SHORT="$(git rev-parse --short HEAD)"
            sed -i "s/^set(BUILD_NUMBER 0)$/set(BUILD_NUMBER ${COUNT})/" cmake/build-info.cmake
            sed -i "s/^set(BUILD_COMMIT \"unknown\")$/set(BUILD_COMMIT \"${SHORT}\")/" cmake/build-info.cmake
            grep -q "set(BUILD_NUMBER ${COUNT})" cmake/build-info.cmake \
              && grep -q "set(BUILD_COMMIT \"${SHORT}\")" cmake/build-info.cmake \
              || { echo "cmake/build-info.cmake no longer has the expected fallback lines; cannot bake the build number into the source artifact" >&2; exit 1; }

            # Unsloth fingerprint: fold "Compiled by the Unsloth team"
            # into BUILD_TARGET, which cmake bakes into LLAMA_BUILD_TARGET, so it
            # prints on llama-server --version ("built with ... for ...") and shows
            # up in `strings` on every binary that links common. Append so it wraps
            # whatever BUILD_TARGET the build computes. Keep this string byte-identical
            # to MARK in the assemble job's verify gate, which re-checks it landed.
            grep -q 'set(BUILD_TARGET' cmake/build-info.cmake \
              || { echo "cmake/build-info.cmake has no BUILD_TARGET line to stamp" >&2; exit 1; }
            printf '\n# Unsloth fingerprint: shows in --version and strings.\nset(BUILD_TARGET "${BUILD_TARGET} (Compiled by the Unsloth team)")\n' >> cmake/build-info.cmake
            grep -q 'Compiled by the Unsloth team' cmake/build-info.cmake \
              || { echo "failed to stamp the Unsloth fingerprint into cmake/build-info.cmake" >&2; exit 1; }

            tar -czf "${RUNNER_TEMP}/llama.cpp-source-${TAG}.tar.gz" --exclude-vcs --transform "s,^\.,llama.cpp-${TAG}," .
            echo "prepared ${TAG} (${COMMIT}, build ${COUNT})"
          else
            echo "release ${TAG} already published; skipping source prep (nothing to build)"
          fi

          # ubuntu-22.04 is x64 (glibc 2.35). arm64 only has ubuntu-24.04-arm
          # available on GitHub-hosted runners (glibc 2.39). arm64 is cuda13-only
          # (no cuda12 SBSA) and ships the single "portable" coverage class.
          # cuda12 installs via Jimver; cuda13 is pinned to 13.3 (matching
          # upstream) which Jimver lacks, so those install via NVIDIA redist in
          # the build children -- on the same runners, so the glibc floor holds.
          ALL='[
            {"profile":"cuda12-legacy",  "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"legacy",  "rank":5, "cuda":"12.8.0","toolkit_line":"12.8","archs":"50-virtual 61-virtual","sms":"50 52 60 61"},
            {"profile":"cuda12-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"older",   "rank":10,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89"},
            {"profile":"cuda12-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"newer",   "rank":20,"cuda":"12.8.0","toolkit_line":"12.8","archs":"86 89 90 100 120"},
            {"profile":"cuda12-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda12","klass":"portable","rank":30,"cuda":"12.8.0","toolkit_line":"12.8","archs":"70 75 80 86 89 90 100 120"},
            {"profile":"cuda13-older",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"older",   "rank":40,"cuda":"13.3","toolkit_line":"13.3","archs":"75 80 86 89"},
            {"profile":"cuda13-newer",   "arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"newer",   "rank":50,"cuda":"13.3","toolkit_line":"13.3","archs":"86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"x64",  "runner":"ubuntu-22.04",    "line":"cuda13","klass":"portable","rank":60,"cuda":"13.3","toolkit_line":"13.3","archs":"75 80 86 89 90 100 120"},
            {"profile":"cuda13-portable","arch":"arm64","runner":"ubuntu-24.04-arm","line":"cuda13","klass":"portable","rank":60,"cuda":"13.3","toolkit_line":"13.3","archs":"90 100 120 121"}
          ]'
          if [ "$ONLY" = "all" ]; then
            CUDA_INCLUDE="$(echo "$ALL" | jq -c .)"
          else
            CUDA_INCLUDE="$(echo "$ALL" | jq -c --arg p "$ONLY" '[.[] | select(.profile==$p)]')"
          fi
          # CUDA Windows reuses the x64 profiles (same arch lists / CUDA
          # versions), just on a Windows runner. arm64 has no CUDA Windows target.
          WIN_CUDA_INCLUDE="$(echo "$CUDA_INCLUDE" | jq -c '[.[] | select(.arch=="x64") | .runner="windows-2022"]')"
          [ -n "$GFX" ] || { echo "refusing empty gfx_target (would publish a CUDA-only release labeled CUDA + ROCm)" >&2; exit 1; }
          ROCM_MATRIX="$(jq -cn --arg g "$GFX" '{gfx_target: ($g | split(",") | map(gsub("^\\s+|\\s+$"; "")))}')"

          # macOS slices are static: two fixed runners with per-slice deployment
          # targets. arm64 builds on macos-26 (newest Metal SDK; avoids the
          # M5/A19 "error compiling source" the macos-14 SDK emits) yet pins
          # minos 14.0 via deploy_target, so it still loads on macOS 14+. x64
          # pins 13.3 (matches upstream's Intel leg, covers 2017 Intel Macs
          # capped at Ventura).
          MACOS_INCLUDE='[
            {"build":"arm64","runner":"macos-26",      "expect_arch":"arm64", "deploy_target":"14.0","defines":"-DGGML_METAL_EMBED_LIBRARY=ON"},
            {"build":"x64",  "runner":"macos-15-intel","expect_arch":"x86_64","deploy_target":"13.3","defines":"-DGGML_METAL=OFF"}
          ]'
          MACOS_INCLUDE="$(echo "$MACOS_INCLUDE" | jq -c .)"

          {
            echo "tag=$TAG"
            echo "repo=$REPO"
            echo "base=$BASE"
            echo "prs=$PRS"
            echo "source_artifact=$SRC_ARTIFACT"
            echo "commit=$COMMIT"
            echo "exists=$EXISTS"
            echo "cuda_matrix={\"include\":$CUDA_INCLUDE}"
            echo "win_cuda_matrix={\"include\":$WIN_CUDA_INCLUDE}"
            echo "rocm_matrix=$ROCM_MATRIX"
            echo "macos_matrix={\"include\":$MACOS_INCLUDE}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $REQ -> $TAG ($COMMIT); prs=$PRS; source_artifact=${SRC_ARTIFACT:-none}; release exists=$EXISTS; only=$ONLY; gfx=$GFX"

      # The stamped source tree (every build): every build child extracts this
      # instead of cloning, and assemble ships it as the release's source-tarball
      # asset, so a source build reproduces the same fingerprinted binary. Only
      # produced when we build, so guard on the same condition as the build jobs
      # (resolve skips source prep on a scheduled no-op, leaving no tarball).
      - name: Upload source artifact
        if: ${{ steps.r.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.r.outputs.source_artifact }}
          path: ${{ runner.temp }}/llama.cpp-source-${{ steps.r.outputs.tag }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-cuda:
    name: CUDA
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cuda.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.cuda_matrix }}

  build-windows-cuda:
    name: CUDA Windows
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cuda-windows.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      commit: ${{ needs.resolve.outputs.commit }}
      matrix: ${{ needs.resolve.outputs.win_cuda_matrix }}

  build-rocm:
    name: ROCm
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-rocm.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      matrix: ${{ needs.resolve.outputs.rocm_matrix }}
      operating_systems: ${{ github.event.inputs.operating_systems || 'windows,ubuntu' }}
      rocm_version: ${{ github.event.inputs.rocm_version || 'latest' }}

  build-macos:
    name: macOS
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-macos.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}
      matrix: ${{ needs.resolve.outputs.macos_matrix }}

  build-cpu:
    name: CPU
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-cpu.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}

  build-vulkan:
    name: Vulkan
    needs: resolve
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/unsloth-prebuilt-vulkan.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
      repo: ${{ needs.resolve.outputs.repo }}
      source_artifact: ${{ needs.resolve.outputs.source_artifact }}

  assemble:
    name: Assemble metadata + publish
    needs: [resolve, build-cuda, build-windows-cuda, build-rocm, build-macos, build-cpu, build-vulkan]
    # No `if: always()`. Atomicity: if any matrix entry in any child
    # workflow failed, the corresponding `build-*` job reports failure, the
    # default `needs` success check skips this assemble job, and nothing is
    # published. The installer needs the full bundle set or it'll fail.
    if: ${{ needs.resolve.outputs.exists != 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with:
          path: tooling

      # The first download attempt occasionally hits a transient ECONNRESET
      # on GitHub's ListArtifacts API. Retrying once is cheaper than
      # re-running the whole hour-long build matrix.
      - name: Download built bundles
        id: download
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      - name: Download built bundles (retry)
        if: steps.download.outcome == 'failure'
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: app-*
          merge-multiple: true

      # Fingerprint gate: every bundle must carry the fingerprint the build children
      # fold into BUILD_TARGET (-> LLAMA_BUILD_TARGET, printed by `--version`). That
      # string is compiled into common (build-info.cpp); on Linux/macOS it lands in
      # llama-server's own .rodata, but on a Windows shared build it can live in the
      # sibling llama-common DLL instead -- so scan every file in the bundle, not
      # just the exe. Nothing but a compiled binary carries this string (no metadata
      # file does), so a hit means the brand shipped. Scan bytes rather than running
      # `--version`: cross-compiled (ROCm) and Windows binaries can't run on this
      # Linux runner. MARK must stay byte-identical to the resolve job's stamp string.
      # Refuse to publish if any bundle is unbranded.
      - name: Verify Unsloth fingerprint in every bundle
        run: |
          set -euo pipefail
          MARK='Compiled by the Unsloth team'
          shopt -s nullglob
          tmp="$(mktemp -d)"
          fail=0
          checked=0
          for arc in dist/app-*.tar.gz dist/app-*.zip dist/llama-*-bin-macos-*.tar.gz; do
            d="$tmp/extract"
            rm -rf "$d"; mkdir -p "$d"
            case "$arc" in
              *.zip)    unzip -qo "$arc" -d "$d" ;;
              *.tar.gz) tar -xzf "$arc" -C "$d" ;;
            esac
            if grep -arq "$MARK" "$d"; then
              checked=$((checked + 1))
            else
              echo "ERROR: $(basename "$arc"): no file carries the Unsloth fingerprint" >&2; fail=1
            fi
          done
          rm -rf "$tmp"
          [ "$checked" -gt 0 ] || { echo "ERROR: no bundles found to verify (expected app-*/llama-*-bin-macos-* in dist/)" >&2; exit 1; }
          [ "$fail" = 0 ] || { echo "ERROR: refusing to publish unbranded binaries" >&2; exit 1; }
          echo "fingerprint verified in $checked bundles"

      # Ship the stamped source tree as release assets so the installer's
      # source-build fallback reproduces the same fingerprinted binary. The resolve
      # job's app-source-* artifact lands the tag-named tarball in dist/ (via the
      # app-* download above); copy it to the commit name too. Both are the exact
      # local bytes assemble_metadata hashes into the sha256 index.
      - name: Fetch source archives
        run: |
          set -eux
          TAG='${{ needs.resolve.outputs.tag }}'
          SHA='${{ needs.resolve.outputs.commit }}'
          cp "dist/llama.cpp-source-${TAG}.tar.gz" "dist/llama.cpp-source-commit-${SHA}.tar.gz"

      - name: Generate manifest + sha256 index
        # prs carries PR titles (arbitrary text), so pass it through env
        # rather than inlining it: a title with a quote would otherwise break out
        # of the shell command. Same handling in the publish step below.
        env:
          PRS_JSON: ${{ needs.resolve.outputs.prs }}
        run: |
          set -eux
          python3 tooling/scripts/unsloth/assemble_metadata.py \
            --tag '${{ needs.resolve.outputs.tag }}' \
            --source-repo '${{ needs.resolve.outputs.repo }}' \
            --base-tag '${{ needs.resolve.outputs.base }}' \
            --pr-set "$PRS_JSON" \
            --commit '${{ needs.resolve.outputs.commit }}' \
            --dist dist --out dist \
            --publish-repo "$GITHUB_REPOSITORY"
          ls -la dist

      - name: Upload full release set (artifacts)
        uses: actions/upload-artifact@v6
        with:
          name: unsloth-prebuilt-${{ needs.resolve.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          # Short retention: the published GitHub release is the canonical
          # storage; this artifact is just debug fallback for failed-publish
          # runs. Default 90 days × ~8 GB/run is real storage cost.
          retention-days: 7

      - name: Verify full bundle coverage before publish
        if: ${{ (github.event_name == 'schedule' || inputs.publish) && needs.resolve.outputs.exists != 'true' }}
        run: |
          set -eu
          TAG='${{ needs.resolve.outputs.tag }}'
          fail=0
          # A partial CUDA set (cuda13 without cuda12) silently strands the
          # cuda12-runtime majority; require matching x64 coverage on both lines.
          # cuda12-legacy has no cuda13 sibling, so `-nE ... p` drops it from
          # this cross-line parity check; its presence is required separately below.
          for os in linux windows; do
            ext=$([ "$os" = windows ] && echo zip || echo tar.gz)
            c12=$(ls dist/app-*-"$os"-x64-cuda12-*."$ext" 2>/dev/null | sed -nE 's/.*cuda12-(older|newer|portable)\..*/\1/p' | sort -u | paste -sd, -)
            c13=$(ls dist/app-*-"$os"-x64-cuda13-*."$ext" 2>/dev/null | sed -nE 's/.*cuda13-(older|newer|portable)\..*/\1/p' | sort -u | paste -sd, -)
            echo "$os x64 coverage: cuda12=[$c12] cuda13=[$c13]"
            [ -n "$c12" ] && [ "$c12" = "$c13" ] || { echo "ERROR: $os x64 cuda12/cuda13 coverage mismatch" >&2; fail=1; }
          done
          # Children passing is not the same as files landing in dist/ (a
          # download-artifact anomaly leaves green jobs and missing bundles),
          # so assert presence of every line not covered by the parity check
          # above (the non-CUDA-x64 lines, plus cuda12-legacy). The resolve-time
          # input guard already pins publish runs to the full default matrix, so
          # these names are exact.
          for f in \
            "app-${TAG}-linux-x64-cuda12-legacy.tar.gz" \
            "app-${TAG}-windows-x64-cuda12-legacy.zip" \
            "llama-${TAG}-bin-macos-arm64.tar.gz" \
            "llama-${TAG}-bin-macos-x64.tar.gz" \
            "app-${TAG}-linux-arm64-cuda13-portable.tar.gz" \
            "app-${TAG}-linux-x64-cpu.tar.gz" \
            "app-${TAG}-windows-x64-cpu.zip" \
            "app-${TAG}-linux-arm64-cpu.tar.gz" \
            "app-${TAG}-windows-arm64-cpu.zip" \
            "app-${TAG}-linux-x64-vulkan.tar.gz" \
            "app-${TAG}-windows-x64-vulkan.zip"; do
            [ -s "dist/$f" ] || { echo "ERROR: missing $f in dist/" >&2; fail=1; }
          done
          # Default ROCm set (mirrors the gfx_target input default): both OSes
          # per family, or AMD hosts of that family silently lose their bundle.
          for gfx in gfx1151 gfx1150 gfx120X gfx110X gfx103X gfx90a gfx908; do
            [ -s "dist/app-${TAG}-linux-x64-rocm-${gfx}.tar.gz" ] || { echo "ERROR: missing linux rocm ${gfx} bundle in dist/" >&2; fail=1; }
            [ -s "dist/app-${TAG}-windows-x64-rocm-${gfx}.zip" ]  || { echo "ERROR: missing windows rocm ${gfx} bundle in dist/" >&2; fail=1; }
          done
          [ "$fail" = 0 ] || { echo "ERROR: refusing to publish a partial release" >&2; exit 1; }

      - name: Publish GitHub release
        if: ${{ (github.event_name == 'schedule' || inputs.publish) && needs.resolve.outputs.exists != 'true' }}
        # prs carries PR titles (arbitrary text), so pass it through env
        # rather than inlining it: a title with a quote would otherwise break out
        # of the shell command.
        env:
          PRS_JSON: ${{ needs.resolve.outputs.prs }}
        run: |
          set -eux
          TAG='${{ needs.resolve.outputs.tag }}'
          REPO="$GITHUB_REPOSITORY"
          PRS="$PRS_JSON"
          BASE='${{ needs.resolve.outputs.base }}'
          # Link the base to the upstream release tag (always resolves). Each PR
          # line is "<title> (#<n>, commit <sha>)": GitHub does not expand a bare
          # reference into the PR title inline (only on hover), so we bake the
          # title in ourselves. #<n> links to the PR in its home repo (full URL,
          # so it resolves no matter which repo hosts the release, and GitHub
          # still attaches its hovercard); non-upstream PRs spell the repo in
          # the link text so an unslothai pin can't read as an upstream one.
          # <sha> links to that pin's commit-in-PR URL. We deliberately do not
          # link the merged commit: in mix mode it is a throwaway merge made on
          # the runner and never pushed anywhere, so any repo@sha URL for it 404s.
          NOTES="Automated Unsloth llama.cpp CUDA + ROCm + Vulkan + macOS + CPU prebuild for upstream [${BASE}](https://github.com/ggml-org/llama.cpp/releases/tag/${BASE})"
          if [ "$(jq length <<<"$PRS")" = 0 ]; then
            NOTES="${NOTES}."
          else
            PR_LIST="$(jq -r 'map("- \(.title) ([\(if .repo == "ggml-org/llama.cpp" then "" else .repo end)#\(.number)](https://github.com/\(.repo)/pull/\(.number)), commit [\(.sha[0:7])](\(.url)))") | join("\n")' <<<"$PRS")"
            NOTES="$(printf '%s, merged with:\n\n%s' "$NOTES" "$PR_LIST")"
          fi

          # Atomic publish: upload as draft (hidden from the anon GitHub API
          # the installer uses), then flip draft=false only once every asset
          # landed. Leftover drafts from failed runs are detected as "not
          # exists" by resolve and rebuilt on the next run.
          if [ "$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq .isDraft 2>/dev/null || true)" = "true" ]; then
            gh release delete "$TAG" --repo "$REPO" --yes
          fi
          gh release create "$TAG" --repo "$REPO" --draft \
            --title "llama.cpp prebuilt $TAG" \
            --notes "$NOTES" \
            dist/*
          gh release edit "$TAG" --repo "$REPO" --draft=false
